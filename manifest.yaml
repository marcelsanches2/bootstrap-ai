version: 1

repo:
  name: bootstrap-ai
  description: Project lifecycle presets for Claude Code and Hermes

defaults:
  conflict_policy: keep-existing-create-new
  lockfile: .bootstrap-ai.lock
  plans_dir: plans
  docs_dir: docs/ai

presets:
  flutter-app:
    path: presets/flutter-app
    detects:
      any: [pubspec.yaml]
      contains:
        pubspec.yaml: ["flutter:"]
    required_files:
      - CLAUDE.md
      - .claude/commands/jarvis-revisor.md
      - .claude/commands/jarvis-test-flow.md
      - .claude/commands/refactor.md
      - .claude/commands/product_roles/role-flutter-qa.md
      - docs/ai/ARCHITECTURE.md
      - docs/ai/CODING_STANDARDS.md
      - docs/ai/FEATURE_GUIDE.md
      - docs/ai/TESTING_GUIDE.md

  python-backend:
    path: presets/python-backend
    detects:
      any: [pyproject.toml, requirements.txt, setup.py]
      prefer_if: [alembic.ini, app/main.py, src]
    required_files:
      - CLAUDE.md
      - .claude/commands/jarvis-revisor.md
      - .claude/commands/jarvis-test-flow.md
      - .claude/commands/refactor.md
      - .claude/commands/product_roles/review-database.md
      - .claude/commands/product_roles/review-api.md
      - docs/ai/ARCHITECTURE.md
      - docs/ai/API_GUIDE.md
      - docs/ai/DATABASE_GUIDE.md
      - docs/ai/TESTING_GUIDE.md

  react-web:
    path: presets/react-web
    detects:
      any: [package.json]
      contains:
        package.json: ["react"]
    required_files:
      - CLAUDE.md
      - .claude/commands/jarvis-revisor.md
      - .claude/commands/jarvis-test-flow.md
      - .claude/commands/refactor.md
      - .claude/commands/product_roles/review-accessibility.md
      - .claude/commands/product_roles/review-performance.md
      - docs/ai/ARCHITECTURE.md
      - docs/ai/DESIGN_SYSTEM.md
      - docs/ai/TESTING_GUIDE.md


  node-backend:
    path: presets/node-backend
    detects:
      any: [package.json]
      prefer_if: [src, tsconfig.json]
    required_files:
      - CLAUDE.md
      - .claude/commands/jarvis-revisor.md
      - .claude/commands/jarvis-test-flow.md
      - .claude/commands/refactor.md
      - .claude/commands/product_roles/review-database.md
      - .claude/commands/product_roles/review-api.md
      - docs/ai/API_GUIDE.md
      - docs/ai/DATABASE_GUIDE.md
      - docs/ai/TESTING_GUIDE.md
