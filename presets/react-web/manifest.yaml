name: react-web
version: 1.0.0
description: React + TypeScript preset for modern web applications with Vite or Next.js
author: bootstrap-ai
tags:
  - react
  - typescript
  - vite
  - nextjs
  - frontend
  - web
stack:
  framework: react
  language: typescript
  buildTool:
    - vite
    - next
  styling: tailwindcss
  stateManagement:
    - zustand
    - tanstack-query
  testing:
    - vitest
    - testing-library
    - playwright
  forms:
    - react-hook-form
    - zod
features:
  - component architecture with feature-based organization
  - centralized data fetching with TanStack Query
  - forms with validation via React Hook Form + Zod
  - design system with Tailwind CSS tokens
  - accessibility with Radix UI or equivalent
  - performance with lazy loading and virtualized lists
  - deployment for Vite static builds and Next server rendering
  - security headers and cache configuration
  - E2E testing with Playwright
  - CI ready
commands:
  - jarvis-plan
  - jarvis-test-flow
  - grill
  - kickoff
  - ship
  - refactor
  - design-phase
roles:
  - role-architect
  - role-frontend-architect
  - role-designer
  - role-web-qa
  - role-pm
  - role-delivery
reviews:
  - review-accessibility
  - review-performance
