detects:
  any:
    - next.config.js
    - next.config.mjs
    - next.config.ts
    - remix.config.js
    - nuxt.config.ts
    - svelte.config.js
  contains:
    - file: package.json
      any: ["next", "remix", "@remix-run/node", "nuxt", "@sveltejs/kit"]

tech_tags:
  - node
  - typescript
  - react
  - next
  - remix
  - vite
  - tailwind
  - prisma
  - drizzle
  - postgres

library_tags:
